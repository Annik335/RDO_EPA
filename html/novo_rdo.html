<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EPA – Novo RDO</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/css/rdo.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
</head>

<body>

    <header>
        <div class="image-logo">
            <img src="/img/Logo EPA.png" class="logo-cabecalho" alt="Logo da Empresa">
        </div>
        <nav>
            <a href="/index.html">Página inicial</a>
            <a href="novo_rdo.html">RDO</a>
            <a href="planilha_campo.html">Planilha de Campo</a>
            <a href="relatorios_salvos.html">Relatório salvos</a>
        </nav>
    </header>

    <!-- SCROLL AREA -->
    <main class="rdo-scroll" id="rdoScroll">

        <!-- 1. DADOS GERAIS -->
        <section class="card" id="secDadosGerais">
            <div class="card-section-header">
                <i class="fas fa-circle-info"></i>
                <h2>Dados Gerais</h2>
            </div>
            <div class="grid-2">
                <div class="campo">
                    <label for="cliente">Cliente</label>
                    <input type="text" id="cliente">
                </div>
                <div class="campo">
                    <label for="contrato">Contrato</label>
                    <input type="text" id="contrato">
                </div>
                <div class="campo">
                    <label for="projeto">Projeto EPA</label>
                    <input type="text" id="projeto">
                </div>
                <div class="campo">
                    <label for="empresa">Empresa</label>
                    <input type="text" id="empresa">
                </div>
                <div class="campo">
                    <label for="local">Local</label>
                    <input type="text" id="local">
                </div>
                <div class="campo">
                    <label for="data">Data</label>
                    <input type="date" id="data">
                </div>
                <div class="campo">
                    <label for="local">Clima</label>
                    <input type="text" id="clima">
                </div>
                <div class="campo">
                    <label for="numeroRdo">Nº RDO</label>
                    <input type="text" id="numeroRdo">
                </div>
                <div class="campo">
                    <label for="realizado">Realizado por</label>
                    <input type="text" id="realizado" >
                </div>
                <div class="campo">
                    <label for="supervisor">Supervisionado por</label>
                    <input type="text" id="supervisor">
                </div>
            </div>
        </section>

        <!-- 2. ATIVIDADE -->
        <section class="card" id="secAtividade">
            <div class="card-section-header">
                <i class="fas fa-pen-to-square"></i>
                <h2>Atividade</h2>
            </div>
            <div class="campo">
                <label for="tituloAtividade">Título da Atividade</label>
                <input type="text" id="tituloAtividade">
            </div>
            <div class="campo" style="margin-top: 12px;">
                <label for="descricao">Descrição da Atividade</label>
                <textarea id="descricao" rows="6" ></textarea>
            </div>
        </section>

        <!-- 3. POÇOS EXECUTADOS -->
        <section class="card" id="secPocos">
            <div class="card-section-header titulo-tabela">
                <div style="display:flex;align-items:center;gap:8px;">
                    <i class="fas fa-map-pin"></i>
                    <h2>Poços Executados</h2>
                </div>
                <button id="addPoco" class="btn-add">
                    <i class="fas fa-plus"></i> Adicionar Poço
                </button>
            </div>
            <div class="table-container">
                <table class="tabela-rdo">
                    <thead>
                        <tr>
                            <th>Poço</th>
                            <th>Profundidade</th>
                            <th>Data Finalização</th>
                            <th>Diâmetro</th>
                            <th>Status</th>
                            <th>Ação</th>
                        </tr>
                    </thead>
                    <tbody id="tabelaPocos"></tbody>
                </table>
            </div>
            <div class="table-empty" id="tableEmpty">
                <i class="fas fa-map-pin"></i>
                <p>Nenhum poço adicionado ainda.</p>
            </div>
        </section>

        <!-- 4. REGISTRO FOTOGRÁFICO -->
        <section class="card" id="secFotos">
            <div class="card-section-header">
                <i class="fas fa-camera"></i>
                <h2>Registro Fotográfico</h2>
            </div>
            <label class="upload-area" for="fotos">
                <i class="fas fa-cloud-arrow-up"></i>
                <span>Clique para adicionar fotos ou arraste aqui</span>
                <small>JPG, PNG, HEIC – múltiplos arquivos permitidos</small>
            </label>
            <input type="file" id="fotos" multiple accept="image/*" capture="environment" style="display:none;">
            <div id="previewFotos" class="galeria"></div>
        </section>

        <!-- 5. INFORMAÇÕES FINAIS -->
        <section class="card" id="secInfoFinais">
            <div class="card-section-header">
                <i class="fas fa-notes-medical"></i>
                <h2>Informações Finais</h2>
            </div>
            <div class="grid-2">
                <div class="campo">
                    <label for="tempoDeslocamento">Tempo de Deslocamento</label>
                    <input type="text" id="tempoDeslocamento">
                </div>
                <div class="campo">
                    <label for="tempoLiberacao">Tempo Aguardando Liberação</label>
                    <input type="text" id="tempoLiberacao">
                </div>
            </div>
            <div class="campo" style="margin-top:12px;">
                <label for="interferencias">Interferências / Dificuldades</label>
                <textarea id="interferencias" rows="3"></textarea>
            </div>
            <div class="campo" style="margin-top:12px;">
                <label for="mudancasPlano">Mudanças no Plano de Trabalho</label>
                <textarea id="mudancasPlano" rows="3"
                  ></textarea>
            </div>
            <div class="campo" style="margin-top:12px;">
                <label for="acidentes">Acidentes / Incidentes</label>
                <textarea id="acidentes" rows="3"></textarea>
            </div>
        </section>

    </main>

    <!-- ===== FOOTER / BARRA DE AÇÕES ===== -->
    <footer class="acoes-bar">

        <!-- Botão de áudio (lado esquerdo) -->
        <button id="btnIA" class="btn btn-audio" title="Preencher por voz">
            <i class="fas fa-microphone" id="micIcon"></i>
            <span id="micLabel">Falar Relatório</span>
        </button>

        <!-- Indicador de gravação -->
        <div class="gravando-badge" id="gravandoBadge">
            <span class="pulse-dot"></span>
            <span id="gravandoTexto">Ouvindo...</span>
        </div>

        <!-- Ações principais (lado direito) -->
        <div class="acoes-direita">
            <button id="btnSalvar" class="btn btn-salvar">
                <i class="fas fa-floppy-disk"></i>
                <span>Salvar</span>
            </button>
            <button id="btnPdf" class="btn btn-pdf">
                <i class="fas fa-file-pdf"></i>
                <span>Gerar PDF</span>
            </button>
            <button id="btnEnviar" class="btn btn-enviar">
                <i class="fas fa-paper-plane"></i>
                <span>Enviar</span>
            </button>
        </div>

    </footer>

    <!-- TOAST DE NOTIFICAÇÃO -->
    <div class="toast" id="toast"></div>

    <!-- EmailJS SDK — deve vir ANTES do rdo.js -->
    <script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js"></script>
    <script src="/js/rdo.js"></script>

</body>

</html>
